<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Cycle Time Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #fafafa;
    --panel: #ffffff;
    --border: #e5e5e5;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #3266ad;
    --accent-soft: rgba(50, 102, 173, 0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px 64px; }
  header { margin-bottom: 24px; }
  h1 { font-size: 28px; font-weight: 600; margin: 0 0 4px; }
  .subtitle { color: var(--muted); font-size: 14px; }
  .freshness { color: var(--muted); font-size: 13px; margin-top: 8px; }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .panel-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-weight: 600;
    margin: 0 0 12px;
  }
  .repo-picker {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .repo-picker input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font: inherit;
    background: white;
  }
  .repo-picker input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .repo-status {
    font-size: 12px;
    color: var(--muted);
    min-height: 16px;
  }
  .repo-status.warn { color: #b45309; }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 20px;
  }
  @media (max-width: 720px) {
    .stats { grid-template-columns: 1fr; }
  }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .stat-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); font-weight: 600; margin-bottom: 6px;
  }
  .stat-value { font-size: 28px; font-weight: 600; }
  .stat-unit { font-size: 13px; color: var(--muted); margin-left: 4px; }

  .charts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  @media (max-width: 980px) {
    .charts { grid-template-columns: 1fr; }
  }
  .chart-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .chart-card h3 { font-size: 13px; font-weight: 600; margin: 0 0 12px; color: var(--text); }
  .chart-card .canvas-wrap { position: relative; height: 240px; }
  .chart-wide { grid-column: 1 / -1; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left;
    padding: 10px 12px;
    background: #f5f5f5;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  tbody td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
  tbody tr:hover { background: #fafafa; }
  td a { color: var(--accent); text-decoration: none; }
  td a:hover { text-decoration: underline; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .sort-row {
    display: flex; gap: 12px; align-items: center;
    margin-bottom: 12px; font-size: 13px;
  }
  .sort-row select {
    padding: 6px 10px; border: 1px solid var(--border);
    border-radius: 6px; font: inherit; background: white;
  }
  .empty { padding: 40px; text-align: center; color: var(--muted); }
  .loading { padding: 40px; text-align: center; color: var(--muted); }
  .error {
    padding: 16px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #991b1b;
    border-radius: 6px;
    margin-bottom: 20px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>PR Cycle Time</h1>
    <div class="subtitle">adobecom · single-repo view</div>
    <div class="freshness" id="freshness">Loading data…</div>
  </header>

  <div id="error" class="error" style="display:none;"></div>

  <div class="panel">
    <div class="panel-title">Repository</div>
    <div class="repo-picker">
      <input id="repo" list="repo-options" autocomplete="off"
             placeholder="Pick a tracked repository…" spellcheck="false">
      <datalist id="repo-options"></datalist>
      <div id="repo-status" class="repo-status"></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Average cycle time</div><div><span id="stat-mean" class="stat-value">—</span><span class="stat-unit">days</span></div></div>
    <div class="stat"><div class="stat-label">90th percentile</div><div><span id="stat-p90" class="stat-value">—</span><span class="stat-unit">days</span></div></div>
    <div class="stat"><div class="stat-label">PRs analyzed</div><div><span id="stat-count" class="stat-value">—</span><span class="stat-unit">merged</span></div></div>
  </div>

  <div class="charts">
    <div class="chart-card chart-wide">
      <h3>Cycle time distribution</h3>
      <div class="canvas-wrap"><canvas id="distChart"></canvas></div>
    </div>
    <div class="chart-card chart-wide">
      <h3>Monthly merged PRs &amp; average cycle time</h3>
      <div class="canvas-wrap" style="height: 280px;"><canvas id="trendChart"></canvas></div>
    </div>
    <div class="chart-card chart-wide">
      <div style="display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:12px; flex-wrap:wrap;">
        <h3 style="margin:0;">Weekly breakdown — merged PRs &amp; average cycle time</h3>
        <div style="display:flex; align-items:center; gap:8px; font-size:13px;">
          <label for="weekMonth" style="color:var(--muted);">Month</label>
          <select id="weekMonth" style="padding:6px 10px; border:1px solid var(--border); border-radius:6px; font:inherit; background:white;"></select>
        </div>
      </div>
      <div class="canvas-wrap" style="height: 280px;"><canvas id="weeklyChart"></canvas></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Pull requests</div>
    <div class="sort-row">
      <label for="sort">Sort</label>
      <select id="sort">
        <option value="merged_desc">Merged date ↓</option>
        <option value="merged_asc">Merged date ↑</option>
        <option value="lead_desc">Cycle time ↓</option>
        <option value="lead_asc">Cycle time ↑</option>
      </select>
    </div>
    <div id="table-wrap">
      <div class="loading">Loading…</div>
    </div>
  </div>
</div>

<script>
const ACCENT = '#3266ad';

let DATA = null;       // payload from data.json
let REPOS_INDEX = null;// payload from repos.json (tracked repo list)
let FILTERED = [];     // current selected repo's PRs
let charts = { dist: null, trend: null, weekly: null };

// ── Load data ─────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const [dataResp, reposResp] = await Promise.all([
      fetch('data.json?_=' + Date.now()),
      fetch('repos.json?_=' + Date.now()),
    ]);
    if (!dataResp.ok)  throw new Error('data.json HTTP '  + dataResp.status);
    if (!reposResp.ok) throw new Error('repos.json HTTP ' + reposResp.status);
    DATA = await dataResp.json();
    REPOS_INDEX = await reposResp.json();

    populateRepoDropdown();
    wireInteractions();
    showFreshness();
    setInitialRepo();
  } catch (e) {
    document.getElementById('freshness').textContent = '';
    const err = document.getElementById('error');
    err.style.display = 'block';
    err.textContent = 'Failed to load data — ' + e.message
      + '. The daily refresh may not have run yet. Check the Actions tab in the repo.';
    document.getElementById('table-wrap').innerHTML = '';
  }
}

function showFreshness() {
  const dt = new Date(DATA.generated_at);
  const opts = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZoneName: 'short' };
  document.getElementById('freshness').textContent =
    'Data refreshed: ' + dt.toLocaleString(undefined, opts)
    + ' · ' + DATA.prs.length + ' merged PRs across ' + DATA.tracked_repos.length + ' repos';
}

// ── Repository picker ─────────────────────────────────────────────────────
function populateRepoDropdown() {
  const list = document.getElementById('repo-options');
  list.innerHTML = '';
  REPOS_INDEX.repos.forEach(name => {
    const o = document.createElement('option');
    o.value = name;
    list.appendChild(o);
  });
}

function wireInteractions() {
  const input = document.getElementById('repo');
  // 'change' fires when the user picks from the dropdown or commits typing
  input.addEventListener('change', onRepoChange);
  // 'input' fires on every keystroke — let it through so picking from
  // the datalist (which fires input then change) feels instant
  input.addEventListener('input', (e) => {
    // If the typed value exactly matches an option, treat as a selection
    if (REPOS_INDEX.repos.includes(e.target.value.trim())) onRepoChange();
  });
  document.getElementById('sort').addEventListener('change', renderTable);
  document.getElementById('weekMonth').addEventListener('change', renderWeeklyChart);
}

function setInitialRepo() {
  // Default to first tracked repo (alphabetical from data.json)
  const first = DATA.tracked_repos[0];
  if (!first) {
    showRepoStatus('No tracked repos available yet.', true);
    return;
  }
  const name = first.split('/')[1];
  document.getElementById('repo').value = name;
  onRepoChange();
}

function onRepoChange() {
  const raw = document.getElementById('repo').value.trim();
  if (!raw) {
    FILTERED = [];
    showRepoStatus('Pick a repository to see its data.');
    renderAll();
    return;
  }

  if (!REPOS_INDEX.repos.includes(raw)) {
    FILTERED = [];
    showRepoStatus(`"${raw}" isn't in the tracked list. Pick from the dropdown.`, true);
    renderAll();
    return;
  }

  const fullName = REPOS_INDEX.org + '/' + raw;
  FILTERED = DATA.prs.filter(p => p.repo === fullName);
  showRepoStatus(`Showing ${FILTERED.length} merged PRs from ${fullName} over the last ${DATA.max_age_days} days.`);
  renderAll();
}

function showRepoStatus(msg, warn = false) {
  const el = document.getElementById('repo-status');
  el.textContent = msg;
  el.classList.toggle('warn', warn);
}

function renderAll() {
  renderStats();
  renderCharts();
  renderTable();
}

// ── Stats ─────────────────────────────────────────────────────────────────
function quantile(sorted, q) {
  if (!sorted.length) return null;
  const pos = (sorted.length - 1) * q;
  const lo = Math.floor(pos), hi = Math.ceil(pos);
  if (lo === hi) return sorted[lo];
  return sorted[lo] + (sorted[hi] - sorted[lo]) * (pos - lo);
}

function renderStats() {
  if (!FILTERED.length) {
    ['stat-mean','stat-p90','stat-count'].forEach(id =>
      document.getElementById(id).textContent = '—');
    return;
  }
  const lead = FILTERED.map(p => p.lead_days).sort((a,b) => a-b);
  const mean = lead.reduce((a,b) => a+b, 0) / lead.length;
  const p90 = quantile(lead, 0.9);

  document.getElementById('stat-mean').textContent = mean.toFixed(1);
  document.getElementById('stat-p90').textContent = p90.toFixed(1);
  document.getElementById('stat-count').textContent = FILTERED.length.toLocaleString();
}

// ── Charts ────────────────────────────────────────────────────────────────
function renderCharts() {
  Object.values(charts).forEach(c => c && c.destroy());

  // Distribution buckets (days)
  const bucketEdges = [0, 1, 2, 3, 5, 7, 14, 30, 60, Infinity];
  const bucketLabels = ['<1d','1–2','2–3','3–5','5–7','1–2w','2–4w','1–2m','>2m'];
  const buckets = bucketLabels.map(() => 0);
  FILTERED.forEach(p => {
    for (let i = 0; i < bucketEdges.length - 1; i++) {
      if (p.lead_days >= bucketEdges[i] && p.lead_days < bucketEdges[i+1]) {
        buckets[i]++; break;
      }
    }
  });

  charts.dist = new Chart(document.getElementById('distChart'), {
    type: 'bar',
    data: { labels: bucketLabels, datasets: [{ data: buckets, backgroundColor: ACCENT, borderRadius: 4 }]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false } },
        y: { grid: { color: 'rgba(0,0,0,0.06)' }, beginAtZero: true, ticks: { precision: 0 } }
      }
    }
  });

  // Monthly trend — count + average
  const byMonth = {};
  FILTERED.forEach(p => {
    const m = p.merged_at.slice(0, 7); // YYYY-MM
    if (!byMonth[m]) byMonth[m] = [];
    byMonth[m].push(p.lead_days);
  });
  const months = Object.keys(byMonth).sort();
  const counts = months.map(m => byMonth[m].length);
  const averages = months.map(m => {
    const vals = byMonth[m];
    return vals.reduce((s, v) => s + v, 0) / vals.length;
  });

  charts.trend = new Chart(document.getElementById('trendChart'), {
    data: {
      labels: months,
      datasets: [
        { type: 'bar', label: 'PRs merged', data: counts, backgroundColor: 'rgba(50,102,173,0.25)', borderRadius: 4, yAxisID: 'y1', order: 2 },
        { type: 'line', label: 'Average cycle time (days)', data: averages, borderColor: ACCENT, backgroundColor: ACCENT, tension: 0.3, pointRadius: 4, yAxisID: 'y', order: 1 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom' } },
      scales: {
        x: { grid: { display: false } },
        y:  { position: 'left',  grid: { color: 'rgba(0,0,0,0.06)' }, title: { display: true, text: 'Average days' }, beginAtZero: true },
        y1: { position: 'right', grid: { display: false }, title: { display: true, text: 'PRs merged' }, beginAtZero: true, ticks: { precision: 0 } }
      }
    }
  });

  // Weekly drill-down — populate month dropdown, then render selected
  syncMonthSelector(months);
  renderWeeklyChart();
}

// ── Weekly drill-down ─────────────────────────────────────────────────────
function syncMonthSelector(months) {
  const sel = document.getElementById('weekMonth');
  const previous = sel.value;
  sel.innerHTML = '';

  if (!months.length) return;

  // Show newest month first; label as "Apr 2026" etc.
  const ordered = months.slice().reverse();
  ordered.forEach(m => {
    const [y, mo] = m.split('-');
    const label = new Date(Number(y), Number(mo) - 1, 1)
      .toLocaleString(undefined, { month: 'short', year: 'numeric' });
    const o = document.createElement('option');
    o.value = m; o.textContent = label;
    sel.appendChild(o);
  });

  // Preserve previous selection if still available; otherwise default to newest
  sel.value = ordered.includes(previous) ? previous : ordered[0];
}

function renderWeeklyChart() {
  if (charts.weekly) { charts.weekly.destroy(); charts.weekly = null; }

  const month = document.getElementById('weekMonth').value;
  if (!month) return;

  const [y, mo] = month.split('-').map(Number);
  const daysInMonth = new Date(y, mo, 0).getDate();

  // Calendar weeks within the month: 1–7, 8–14, 15–21, 22–28, 29–end
  const weekRanges = [];
  for (let start = 1; start <= daysInMonth; start += 7) {
    const end = Math.min(start + 6, daysInMonth);
    weekRanges.push({ start, end });
  }

  const buckets = weekRanges.map(() => []);
  FILTERED.forEach(p => {
    if (p.merged_at.slice(0, 7) !== month) return;
    const day = Number(p.merged_at.slice(8, 10));
    for (let i = 0; i < weekRanges.length; i++) {
      if (day >= weekRanges[i].start && day <= weekRanges[i].end) {
        buckets[i].push(p.lead_days);
        break;
      }
    }
  });

  const labels = weekRanges.map((r, i) => `Week ${i + 1} (${r.start}–${r.end})`);
  const counts = buckets.map(b => b.length);
  const averages = buckets.map(b => b.length ? b.reduce((a, c) => a + c, 0) / b.length : null);

  charts.weekly = new Chart(document.getElementById('weeklyChart'), {
    data: {
      labels,
      datasets: [
        { type: 'bar',  label: 'PRs merged',                  data: counts,   backgroundColor: 'rgba(50,102,173,0.25)', borderRadius: 4, yAxisID: 'y1', order: 2 },
        { type: 'line', label: 'Average cycle time (days)',   data: averages, borderColor: ACCENT, backgroundColor: ACCENT, tension: 0.3, pointRadius: 4, yAxisID: 'y',  order: 1, spanGaps: true }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom' },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              if (ctx.dataset.type === 'line') {
                return ctx.parsed.y == null
                  ? 'No PRs this week'
                  : `Average: ${ctx.parsed.y.toFixed(1)}d`;
              }
              return `${ctx.parsed.y} PRs merged`;
            }
          }
        }
      },
      scales: {
        x:  { grid: { display: false } },
        y:  { position: 'left',  grid: { color: 'rgba(0,0,0,0.06)' }, title: { display: true, text: 'Average days' }, beginAtZero: true },
        y1: { position: 'right', grid: { display: false }, title: { display: true, text: 'PRs merged' }, beginAtZero: true, ticks: { precision: 0 } }
      }
    }
  });
}

// ── Table ─────────────────────────────────────────────────────────────────
function renderTable() {
  const sort = document.getElementById('sort').value;
  const rows = FILTERED.slice();
  const cmp = {
    merged_desc: (a,b) => b.merged_at.localeCompare(a.merged_at),
    merged_asc:  (a,b) => a.merged_at.localeCompare(b.merged_at),
    lead_desc:   (a,b) => b.lead_days - a.lead_days,
    lead_asc:    (a,b) => a.lead_days - b.lead_days,
  }[sort];
  rows.sort(cmp);

  const wrap = document.getElementById('table-wrap');
  if (!rows.length) {
    wrap.innerHTML = '<div class="empty">No PRs match the current filters.</div>';
    return;
  }

  const top = rows.slice(0, 200); // cap rendered rows
  const html = `
    <table>
      <thead>
        <tr>
          <th>#</th><th>Title</th><th>Repo</th><th>Author</th>
          <th>Created</th><th>Merged</th><th class="num">Cycle time</th>
        </tr>
      </thead>
      <tbody>
        ${top.map(p => `
          <tr>
            <td><a href="${p.url}" target="_blank" rel="noopener">#${p.number}</a></td>
            <td>${escapeHtml(p.title)}</td>
            <td>${p.repo.split('/')[1]}</td>
            <td>${escapeHtml(p.author)}</td>
            <td>${p.created_at.slice(0,10)}</td>
            <td>${p.merged_at.slice(0,10)}</td>
            <td class="num">${p.lead_days.toFixed(2)}d</td>
          </tr>`).join('')}
      </tbody>
    </table>
    ${rows.length > 200 ? `<div class="empty" style="padding: 16px;">Showing 200 of ${rows.length} PRs</div>` : ''}
  `;
  wrap.innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

loadData();
</script>
</body>
</html>
