<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Cycle Time Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #fafafa;
    --panel: #ffffff;
    --border: #e5e5e5;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #3266ad;
    --accent-soft: rgba(50, 102, 173, 0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px 64px; }
  header { margin-bottom: 24px; }
  h1 { font-size: 28px; font-weight: 600; margin: 0 0 4px; }
  .subtitle { color: var(--muted); font-size: 14px; }
  .freshness { color: var(--muted); font-size: 13px; margin-top: 8px; }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .panel-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-weight: 600;
    margin: 0 0 12px;
  }
  .filters {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 16px;
    align-items: end;
  }
  @media (max-width: 720px) {
    .filters { grid-template-columns: 1fr; }
  }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  select[multiple] {
    width: 100%;
    min-height: 90px;
    padding: 6px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font: inherit;
    background: white;
  }
  select[multiple] option { padding: 4px 6px; }
  button {
    padding: 10px 18px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    font: inherit;
    font-weight: 500;
    cursor: pointer;
  }
  button:hover { background: #2855a0; }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 20px;
  }
  @media (max-width: 720px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
  }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .stat-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); font-weight: 600; margin-bottom: 6px;
  }
  .stat-value { font-size: 28px; font-weight: 600; }
  .stat-unit { font-size: 13px; color: var(--muted); margin-left: 4px; }

  .charts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  @media (max-width: 980px) {
    .charts { grid-template-columns: 1fr; }
  }
  .chart-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .chart-card h3 { font-size: 13px; font-weight: 600; margin: 0 0 12px; color: var(--text); }
  .chart-card .canvas-wrap { position: relative; height: 240px; }
  .chart-wide { grid-column: 1 / -1; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left;
    padding: 10px 12px;
    background: #f5f5f5;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  tbody td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
  tbody tr:hover { background: #fafafa; }
  td a { color: var(--accent); text-decoration: none; }
  td a:hover { text-decoration: underline; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .sort-row {
    display: flex; gap: 12px; align-items: center;
    margin-bottom: 12px; font-size: 13px;
  }
  .sort-row select {
    padding: 6px 10px; border: 1px solid var(--border);
    border-radius: 6px; font: inherit; background: white;
  }
  .empty { padding: 40px; text-align: center; color: var(--muted); }
  .loading { padding: 40px; text-align: center; color: var(--muted); }
  .error {
    padding: 16px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #991b1b;
    border-radius: 6px;
    margin-bottom: 20px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>PR Cycle Time</h1>
    <div class="subtitle">adobecom · mas · mas-pinata · milo</div>
    <div class="freshness" id="freshness">Loading data…</div>
  </header>

  <div id="error" class="error" style="display:none;"></div>

  <div class="panel">
    <div class="panel-title">Filters</div>
    <div class="filters">
      <div class="field">
        <label for="repos">Repositories</label>
        <select id="repos" multiple></select>
      </div>
      <div class="field">
        <label for="authors">Authors</label>
        <select id="authors" multiple></select>
      </div>
      <div>
        <button id="apply">Apply filters</button>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Median cycle time</div><div><span id="stat-median" class="stat-value">—</span><span class="stat-unit">days</span></div></div>
    <div class="stat"><div class="stat-label">Average cycle time</div><div><span id="stat-mean" class="stat-value">—</span><span class="stat-unit">days</span></div></div>
    <div class="stat"><div class="stat-label">90th percentile</div><div><span id="stat-p90" class="stat-value">—</span><span class="stat-unit">days</span></div></div>
    <div class="stat"><div class="stat-label">PRs analyzed</div><div><span id="stat-count" class="stat-value">—</span><span class="stat-unit">merged</span></div></div>
  </div>

  <div class="charts">
    <div class="chart-card">
      <h3>Cycle time distribution</h3>
      <div class="canvas-wrap"><canvas id="distChart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>By author — median cycle time</h3>
      <div class="canvas-wrap"><canvas id="authorChart"></canvas></div>
    </div>
    <div class="chart-card chart-wide">
      <h3>Monthly merged PRs &amp; median cycle time</h3>
      <div class="canvas-wrap" style="height: 280px;"><canvas id="trendChart"></canvas></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Pull requests</div>
    <div class="sort-row">
      <label for="sort">Sort</label>
      <select id="sort">
        <option value="merged_desc">Merged date ↓</option>
        <option value="merged_asc">Merged date ↑</option>
        <option value="lead_desc">Cycle time ↓</option>
        <option value="lead_asc">Cycle time ↑</option>
      </select>
    </div>
    <div id="table-wrap">
      <div class="loading">Loading…</div>
    </div>
  </div>
</div>

<script>
const ACCENT = '#3266ad';

let DATA = null;       // full payload from data.json
let FILTERED = [];     // current filtered subset
let charts = { dist: null, author: null, trend: null };

// ── Load data ─────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const resp = await fetch('data.json?_=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    DATA = await resp.json();
    initFilters();
    applyFilters();
    showFreshness();
  } catch (e) {
    document.getElementById('freshness').textContent = '';
    const err = document.getElementById('error');
    err.style.display = 'block';
    err.textContent = 'Failed to load data.json — ' + e.message
      + '. The daily refresh may not have run yet. Check the Actions tab in the repo.';
    document.getElementById('table-wrap').innerHTML = '';
  }
}

function showFreshness() {
  const dt = new Date(DATA.generated_at);
  const opts = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZoneName: 'short' };
  document.getElementById('freshness').textContent =
    'Data refreshed: ' + dt.toLocaleString(undefined, opts)
    + ' · ' + DATA.prs.length + ' merged PRs · last ' + DATA.max_age_days + ' days';
}

// ── Filters ───────────────────────────────────────────────────────────────
function initFilters() {
  const repoSel = document.getElementById('repos');
  DATA.repos.forEach(r => {
    const o = document.createElement('option');
    o.value = r; o.textContent = r; o.selected = true;
    repoSel.appendChild(o);
  });

  const authorSel = document.getElementById('authors');
  const authors = [...new Set(DATA.prs.map(p => p.author))].sort();
  authors.forEach(a => {
    const o = document.createElement('option');
    o.value = a; o.textContent = a; o.selected = true;
    authorSel.appendChild(o);
  });

  document.getElementById('apply').addEventListener('click', applyFilters);
  document.getElementById('sort').addEventListener('change', renderTable);
}

function applyFilters() {
  const repos = [...document.getElementById('repos').selectedOptions].map(o => o.value);
  const authors = [...document.getElementById('authors').selectedOptions].map(o => o.value);
  const repoSet = new Set(repos);
  const authorSet = new Set(authors);

  FILTERED = DATA.prs.filter(p => repoSet.has(p.repo) && authorSet.has(p.author));

  renderStats();
  renderCharts();
  renderTable();
}

// ── Stats ─────────────────────────────────────────────────────────────────
function quantile(sorted, q) {
  if (!sorted.length) return null;
  const pos = (sorted.length - 1) * q;
  const lo = Math.floor(pos), hi = Math.ceil(pos);
  if (lo === hi) return sorted[lo];
  return sorted[lo] + (sorted[hi] - sorted[lo]) * (pos - lo);
}

function renderStats() {
  if (!FILTERED.length) {
    ['stat-median','stat-mean','stat-p90','stat-count'].forEach(id =>
      document.getElementById(id).textContent = '—');
    return;
  }
  const lead = FILTERED.map(p => p.lead_days).sort((a,b) => a-b);
  const median = quantile(lead, 0.5);
  const mean = lead.reduce((a,b) => a+b, 0) / lead.length;
  const p90 = quantile(lead, 0.9);

  document.getElementById('stat-median').textContent = median.toFixed(1);
  document.getElementById('stat-mean').textContent = mean.toFixed(1);
  document.getElementById('stat-p90').textContent = p90.toFixed(1);
  document.getElementById('stat-count').textContent = FILTERED.length.toLocaleString();
}

// ── Charts ────────────────────────────────────────────────────────────────
function renderCharts() {
  Object.values(charts).forEach(c => c && c.destroy());

  // Distribution buckets (days)
  const bucketEdges = [0, 1, 2, 3, 5, 7, 14, 30, 60, Infinity];
  const bucketLabels = ['<1d','1–2','2–3','3–5','5–7','1–2w','2–4w','1–2m','>2m'];
  const buckets = bucketLabels.map(() => 0);
  FILTERED.forEach(p => {
    for (let i = 0; i < bucketEdges.length - 1; i++) {
      if (p.lead_days >= bucketEdges[i] && p.lead_days < bucketEdges[i+1]) {
        buckets[i]++; break;
      }
    }
  });

  charts.dist = new Chart(document.getElementById('distChart'), {
    type: 'bar',
    data: { labels: bucketLabels, datasets: [{ data: buckets, backgroundColor: ACCENT, borderRadius: 4 }]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false } },
        y: { grid: { color: 'rgba(0,0,0,0.06)' }, beginAtZero: true, ticks: { precision: 0 } }
      }
    }
  });

  // Author chart — median per author, top 15 by PR count
  const byAuthor = {};
  FILTERED.forEach(p => {
    if (!byAuthor[p.author]) byAuthor[p.author] = [];
    byAuthor[p.author].push(p.lead_days);
  });
  const authorRows = Object.entries(byAuthor)
    .map(([a, vals]) => ({
      author: a,
      count: vals.length,
      median: quantile(vals.slice().sort((x,y) => x-y), 0.5)
    }))
    .sort((a,b) => b.count - a.count)
    .slice(0, 15);

  charts.author = new Chart(document.getElementById('authorChart'), {
    type: 'bar',
    data: {
      labels: authorRows.map(r => r.author),
      datasets: [{ data: authorRows.map(r => r.median), backgroundColor: ACCENT, borderRadius: 4 }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => `Median ${ctx.parsed.x.toFixed(1)}d · ${authorRows[ctx.dataIndex].count} PRs`
          }
        }
      },
      scales: {
        x: { grid: { color: 'rgba(0,0,0,0.06)' }, title: { display: true, text: 'Median days' } },
        y: { grid: { display: false } }
      }
    }
  });

  // Monthly trend — count + median
  const byMonth = {};
  FILTERED.forEach(p => {
    const m = p.merged_at.slice(0, 7); // YYYY-MM
    if (!byMonth[m]) byMonth[m] = [];
    byMonth[m].push(p.lead_days);
  });
  const months = Object.keys(byMonth).sort();
  const counts = months.map(m => byMonth[m].length);
  const medians = months.map(m => quantile(byMonth[m].slice().sort((x,y) => x-y), 0.5));

  charts.trend = new Chart(document.getElementById('trendChart'), {
    data: {
      labels: months,
      datasets: [
        { type: 'bar', label: 'PRs merged', data: counts, backgroundColor: 'rgba(50,102,173,0.25)', borderRadius: 4, yAxisID: 'y1', order: 2 },
        { type: 'line', label: 'Median cycle time (days)', data: medians, borderColor: ACCENT, backgroundColor: ACCENT, tension: 0.3, pointRadius: 4, yAxisID: 'y', order: 1 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom' } },
      scales: {
        x: { grid: { display: false } },
        y:  { position: 'left',  grid: { color: 'rgba(0,0,0,0.06)' }, title: { display: true, text: 'Median days' }, beginAtZero: true },
        y1: { position: 'right', grid: { display: false }, title: { display: true, text: 'PRs merged' }, beginAtZero: true, ticks: { precision: 0 } }
      }
    }
  });
}

// ── Table ─────────────────────────────────────────────────────────────────
function renderTable() {
  const sort = document.getElementById('sort').value;
  const rows = FILTERED.slice();
  const cmp = {
    merged_desc: (a,b) => b.merged_at.localeCompare(a.merged_at),
    merged_asc:  (a,b) => a.merged_at.localeCompare(b.merged_at),
    lead_desc:   (a,b) => b.lead_days - a.lead_days,
    lead_asc:    (a,b) => a.lead_days - b.lead_days,
  }[sort];
  rows.sort(cmp);

  const wrap = document.getElementById('table-wrap');
  if (!rows.length) {
    wrap.innerHTML = '<div class="empty">No PRs match the current filters.</div>';
    return;
  }

  const top = rows.slice(0, 200); // cap rendered rows
  const html = `
    <table>
      <thead>
        <tr>
          <th>#</th><th>Title</th><th>Repo</th><th>Author</th>
          <th>Created</th><th>Merged</th><th class="num">Cycle time</th>
        </tr>
      </thead>
      <tbody>
        ${top.map(p => `
          <tr>
            <td><a href="${p.url}" target="_blank" rel="noopener">#${p.number}</a></td>
            <td>${escapeHtml(p.title)}</td>
            <td>${p.repo.split('/')[1]}</td>
            <td>${escapeHtml(p.author)}</td>
            <td>${p.created_at.slice(0,10)}</td>
            <td>${p.merged_at.slice(0,10)}</td>
            <td class="num">${p.lead_days.toFixed(1)}d</td>
          </tr>`).join('')}
      </tbody>
    </table>
    ${rows.length > 200 ? `<div class="empty" style="padding: 16px;">Showing 200 of ${rows.length} PRs</div>` : ''}
  `;
  wrap.innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

loadData();
</script>
</body>
</html>
